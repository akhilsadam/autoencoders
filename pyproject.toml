[project]
name = "autoencoders"
version = "0.1.0"
description = ""
authors = [
    {name = "Akhil Sadam", email = "sadam.akhil@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
dynamic = ["dependencies"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = [
    "setuptools>=69",
    "wheel",
    "uv",
]
build-backend = "setuptools.build_meta"

[tool.hatch.metadata] 
allow-direct-references = true

[tool.pytest]
minversion = "9.0"
python_files = ["*.py"]
python_classes = ["_TEST_*"]
python_functions = ["_test_*"]

[tool.pytest.ini_options]
pythonpath = "src"
addopts = [
    "--import-mode=importlib",
    "--capture=no",
    '-vvv'
    ]

[tool.setuptools.dynamic]
dependencies = { file = ["src/install/requirements.txt"] }
