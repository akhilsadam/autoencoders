defaults:
  - model: conv_autoencoder
  - data: fashion_mnist
  - _self_

seed: 42

paths:
  data_root: ${oc.env:DATA_ROOT, ./data}
  artifacts_root: ${hydra:run.dir}/artifacts

run:
  name: ${hydra:job.name}
  tags: [autoencoder, baseline]

wandb:
  project: autoencoder-dev
  entity: null
  group: hydra
  mode: online
  name: ${run.name}
  tags: ${run.tags}

trainer:
  max_epochs: -1
  max_steps: 20000
  accelerator: auto
  devices: auto
  log_every_n_steps: 10
  precision: 32

hydra:
  run:
    dir: runs/${now:%Y%m%d}/${now:%H%M%S}
  sweep:
    dir: runs/multirun/${now:%Y%m%d}
    subdir: ${hydra.job.num}
