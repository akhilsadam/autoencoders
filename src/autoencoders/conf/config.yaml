defaults:
  - _self_
  - model: null
  - data: null
  - exp: mnist
  
project: null

seed: 42

paths:
  data_root: ${oc.env:AUTOENCODERS_DATA_ROOT, ./data}
  artifacts_root: ${hydra:runtime.output_dir}/artifacts

run:
  name: ${hydra:job.name}
  tags: [autoencoder, baseline]

wandb:
  project: ${project}
  entity: null
  group: hydra
  mode: online
  name: ${run.name}
  tags: ${run.tags}

trainer:
  max_epochs: -1
  max_steps: -1
  accelerator: auto
  devices: auto
  log_every_n_steps: 50
  precision: 32

git:
  sha: ${gitinfo:sha}
  dirty: ${gitinfo:dirty}
  long_msg: ${gitinfo:long_msg}
  short_msg: ${gitinfo:short_msg}

hydra:
  run:
    dir: runs/${data.fullname}/${model.name}/${sec_id:}_${git.short_msg}
  job:
    config:
      override_dirname:
        kv_sep: '='
        item_sep: '_'
  sweep:
    dir: runs/sweep/${run.name}_${sec_id:}
    subdir: ${hydra.job.override_dirname}___${hydra.job.num}
