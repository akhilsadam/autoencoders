name: aesthetic4k
params:
  root: ${paths.data_root}/aesthetic4k
  batch_size: 32
  num_workers: 8
  val_split: 512
  image_size: 256
  normalize: true
  seed: ${seed}
  split: train
  use_metadata: false
  metadata_filename: metadata.csv
  filepath_column: filepath
  label_column: label
  split_column: split