name: forced_turbulence
fullname: decaying_turbulence
params:
  root: ${paths.data_root}/decaying_turbulence
  version: 1
  grid_size: 512
  Lx: 6.283185307179586  # 2*pi
  Ly: 6.283185307179586  # 2*pi
  num_samples: 20
  time_steps: 400000
  save_rate: 1000
  dt: 0.001
  spinup_frames: 100
  
  # Physics parameters
  mu: 0.0
  nu: 1.025e-6
  B: 0.0
  ic_energy: 0.01 # some tiny randomness 
  ic_wavenumbers: [10.0, 32.0]
  
  # Forcing parameters
  forcing_A: 0.0
  forcing_B: 0.0
  forcing_C: 0.0
  forcing_D: 0.0
  forcing_E: 0.0
  forcing_F: 0.0
  
  batch_size: 32
  num_workers: 4
  val_split: 20
  seed: 42
