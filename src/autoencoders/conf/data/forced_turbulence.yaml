name: forced_turbulence
params:
  root: ${paths.data_root}/forced_turbulence
  version: 1
  grid_size: 512
  Lx: 12.566370614359172  # 4*pi
  Ly: 12.566370614359172  # 4*pi
  num_samples: 20
  time_steps: 100000
  save_rate: 200
  dt: 0.001
  spinup_frames: 100
  
  # Physics parameters
  mu: 0.02
  nu: 1.025e-4
  B: 1.0
  ic_energy: 0.001 # some tiny randomness 
  ic_wavenumbers: [3.0, 5.0]
  
  # Forcing parameters
  forcing_A: -0.1
  forcing_B: 2.0
  forcing_C: 0.0
  forcing_D: 0.1
  forcing_E: 2.0
  forcing_F: 0.0
  
  batch_size: 32
  num_workers: 4
  val_split: 20
  seed: 42
