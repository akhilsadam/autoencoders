        # "q lap 0.003 * q 1 q - * q neg + +",
        # "q lap 0.003 * q tanh +",
        # "q lap 0.01 * q neg q cube + +",
        # "q lap 0.01 * q q square 1 - * +",
        # "q lap 0.001 * q 1 q - * 0.1 * +",
        # "q lap 0.001 * q square 1 q - * 0.1 * +",
        # "q lap 0.003 * q 0.5 * 1 q - * +",
        # "q lap 0.001 * q neg q square + +",
        # "q lap 0.001 * q tanh neg +",
        # "q lap 0.001 * q sin +",
        # "q lap 0.003 * q neg q cube 0.1 * + +",
        # "q lap 0.001 * q 1 q - * q 0.1 * neg + +",

