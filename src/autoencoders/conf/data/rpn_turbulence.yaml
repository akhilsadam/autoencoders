name: rpn_turbulence
fullname: rpn_turbulence
params:
  root: ${paths.data_root}/rpn_turbulence
  version: 2 # now we don't randomly generate...
  grid_size: 512
  Lx: 12.566370614359172  # 4*pi
  Ly: 12.566370614359172  # 4*pi
  num_samples: 4 # not as many since we have more pdes
  time_steps: 100000
  save_rate: 200
  dt: 0.001
  spinup_frames: 100
  
  # Physics parameters
  mu: 0.02
  nu: 1.025e-4
  B: 1.0
  ic_energy: 0.005 # some tiny randomness 
  ic_wavenumbers: [3.0, 10.0]
  
  # Forcing parameters
  forcing_A: -0.1
  forcing_B: 2.0
  forcing_C: 0.0
  forcing_D: 0.1
  forcing_E: 2.0
  forcing_F: 0.0
  
  batch_size: 32
  num_workers: 16
  test_workers: 16
  val_split: 20
  seed: 42

  n_train: 60
  n_test: 9

  seq_len: 2
  test_seq_len: 16

  rpns: [
    [ # TESTING # OOD # signs are flipped on purpose to give different directions
        # Charney-Hasegawa-Mima equation — plasma/atmosphere analog,
        # adds a dispersive term (q - psi) that gives Rossby/drift waves.
        # dq/dt = -J(psi, q) + beta * d(psi)/dx
        # where q = lap(psi) - psi (modified potential vorticity)
        "q psi jacobian psi dx 1.2 * +",

        # Quasi-geostrophic with bottom topography h(x,y) = sin(x)cos(y).
        # The topographic term acts like a background PV gradient.
        # dq/dt = -J(psi, q + h) = -J(psi,q) - J(psi, h)
        # J(psi, h) ~ u * dh/dx + v * dh/dy = u*cos(2x)cos(3y) - v*sin(2x)sin(3y)
        "q psi jacobian neg u x 2 * cos * y 3 * cos * neg + v x 2 * sin * y 3 * sin * +",

        # Salmon's geostrophic turbulence with surface buoyancy.
        # Surface QG: dq/dt = -J(psi, q) where q = sqrt(-lap) psi (nonlocal),
        # approximated here with invlap giving a shallower energy spectrum.
        # dq/dt = -J(psi, q) + nu * lap(q) - r * invlap(q)
        "q psi jacobian neg q lap 0.00012 * + q invlap 0.013 * neg +",

        # Hasegawa-Wakatani plasma turbulence —
        # couples vorticity q to density n via parallel conductivity c.
        # dq/dt = -J(psi, q) + c*(n - psi) + nu*lap(q)
        # here we use psi as a proxy for n (single-field approximation):
        # dq/dt = -J(psi,q) + c*(psi - q) + nu*lap(q)
        "q psi jacobian neg psi q - 0.0015 * + q lap 0.014 * +",

        # Standard Eulerian QG.
        # dq/dt = -J(psi, q)
        "q psi jacobian",

        # QG with (hyper)diffusion — classic turbulence setup.
        # dq/dt = J(psi, q) + nu*lap(q)
        "q psi jacobian neg + q lap 0.001 * + q lap lap 0.01 * +",

        # Forced QG (double gyre wind stress) — should produce recognizable gyre pattern.
        # dq/dt = -J(psi, q) + nu*lap(q) + F(x,y)
        "q psi jacobian neg q lap 0.001 * + x sin y cos * 0.1 * +",
        "q lap 0.00001 * x y * cos - q psi jacobian +",

        # Pure vorticity diffusion — trivially stable, result should decay to zero.
        # dq/dt = nu*lap(q)
        "q lap 0.0017 *",
    ],
    # [],
    [   # Train # simpler examples
        # Advection / Transport
        "q u v grad + * neg",
        "q psi jacobian neg",
        "q u dx * v dy * + neg",
        "q psi jacobian q lap 0.001 * +",
        "q psi jacobian q lap 0.0001 * + neg",
        "q u dx * neg",
        "q v dy * neg",
        "q u dx * v dy * + neg q lap 0.01 * +",
        "q u dx * v dy * + neg q lap 0.001 * +",
        "q u dx * v dy * + neg q lap 0.0001 * +",
        "q psi jacobian q lap 0.00001 * +",
        "q psi jacobian u dx * +",
        "q psi jacobian v dy * +",
        "q psi jacobian u dx * v dy * + +",

        # Diffusion
        "q lap 0.01 *",
        "q lap 0.001 *",
        "q lap 0.0001 *",
        "q lap 0.0001 * q 0.01 * neg +",
        "q lap 0.001 * q 0.001 * +",
        "q lap 0.01 * q 0.1 * +",

        ## "q lap 0.01 * q square neg +", # too boring
        ## "q lap 0.001 * q cube neg +", # overflow
        ## "q lap 0.001 * q neg + q cube +", # exploded of course
        ## "q lap 0.0001 * q square +", # exploded, of course

        # # Diffusion + Reaction
        # "q lap 0.003 * q 1 q - * q 0.5 - * 0.1 * +",  # gentler Allen-Cahn
        # "q lap 0.003 * q 0.2 * + q cube neg +",       # Ginzburg-Landau
        # "q lap 0.01 * q + q cube neg +",              # GL with extra diffusion

        ## "q lap 0.003 * q 0.1 * +",
        ## "q lap 0.003 * q 1 q - * +", # cool! exploded
