name: qg_turbulence
fullname: qg_turbulence

params:
  batch_size: 32
  num_workers: 4
  
  # QG simulation parameters
  grid_size: 128
  num_samples: 100
  time_steps: 200
  save_rate: 10
  dt: 0.001
  
  # Physics parameters
  nu: 1.025e-5  # Viscosity
  mu: 0.0       # Linear drag
  beta: 0.0     # Beta plane
  
  # Caching (automatic versioning via hash)
  cache_root: ${paths.data_root}/qg_cache
  force_regenerate: false
  
  # Train/val split
  val_split: 0.2
  
  seed: ${seed}
